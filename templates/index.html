<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mock Data Factory</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.7.2/font/bootstrap-icons.css" rel="stylesheet">
    <link
        href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&family=Poppins:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <style>
        /* ========== Root CSS Variables (Default - Light Theme) ========== */
        :root {
            /* Colors */
            --bg-color: #f8f9fa;
            --content-bg-color: #ffffff;
            --text-color: #212529;
            --text-secondary-color: #6c757d;
            --primary-color: #0d6efd;
            --primary-color-hover: #0b5ed7;
            --accent-text-color: #ffffff;
            --border-color: #dee2e6;
            --border-radius: 6px;
            --border-radius-sm: 4px;
            --border-radius-lg: 8px;

            /* Input fields */
            --input-bg-color: #ffffff;
            --input-text-color: #212529;
            --input-border-color: #ced4da;
            --input-focus-border-color: #86b7fe;
            --input-focus-shadow: 0 0 0 0.25rem rgba(13, 110, 253, 0.25);
            --input-disabled-bg-color: #e9ecef;

            /* Buttons */
            --button-primary-bg: #0d6efd;
            --button-primary-text: #ffffff;
            --button-primary-hover-bg: #0b5ed7;
            --button-primary-border: #0d6efd;
            --button-secondary-bg: #6c757d;
            --button-secondary-text: #ffffff;
            --button-secondary-hover-bg: #5c636a;
            --button-secondary-border: #6c757d;
            --button-success-bg: #198754;
            --button-success-text: #ffffff;
            --button-success-hover-bg: #157347;
            --button-success-border: #198754;
            --button-outline-color: #0d6efd;
            --button-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);

            /* Shadows */
            --box-shadow-sm: 0 .125rem .25rem rgba(0, 0, 0, .075);
            --box-shadow: 0 .5rem 1rem rgba(0, 0, 0, .15);
            --box-shadow-lg: 0 1rem 3rem rgba(0, 0, 0, .175);

            /* Fonts */
            --font-family-base: 'Roboto', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            --font-family-headings: 'Poppins', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            --font-weight-normal: 400;
            --font-weight-bold: 600;

            /* Transitions */
            --transition-speed: 0.3s;
        }

        /* ========== Dark Theme Variables ========== */
        body.theme-dark {
            /* Colors */
            --bg-color: #212529;
            --content-bg-color: #343a40;
            --text-color: #e9ecef;
            --text-secondary-color: #adb5bd;
            --primary-color: #4dabf7;
            --primary-color-hover: #339af0;
            --accent-text-color: #212529;
            --border-color: #495057;

            /* Input fields */
            --input-bg-color: #2b3035;
            --input-text-color: #e9ecef;
            --input-border-color: #495057;
            --input-focus-border-color: #4dabf7;
            --input-focus-shadow: 0 0 0 0.25rem rgba(77, 171, 247, 0.4);
            --input-disabled-bg-color: #343a40;

            /* Buttons */
            --button-primary-bg: #4dabf7;
            --button-primary-text: #212529;
            --button-primary-hover-bg: #339af0;
            --button-primary-border: #4dabf7;
            --button-secondary-bg: #6c757d;
            --button-secondary-text: #ffffff;
            --button-secondary-hover-bg: #5c636a;
            --button-secondary-border: #6c757d;
            --button-success-bg: #20c997;
            --button-success-text: #212529;
            --button-success-hover-bg: #1ba87f;
            --button-success-border: #20c997;
            --button-outline-color: #4dabf7;
            --button-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);

            /* Shadows */
            --box-shadow-sm: 0 .125rem .25rem rgba(0, 0, 0, .2);
            --box-shadow: 0 .5rem 1rem rgba(0, 0, 0, .4);
            --box-shadow-lg: 0 1rem 3rem rgba(0, 0, 0, .5);
        }

        /* ========== Professional Blue Theme Variables ========== */
        body.theme-blue {
            /* Colors */
            --bg-color: #eef2f7;
            --content-bg-color: #ffffff;
            --text-color: #293e56;
            --text-secondary-color: #6c89a5;
            --primary-color: #1a73e8;
            --primary-color-hover: #1765cc;
            --accent-text-color: #ffffff;
            --border-color: #d8e1e9;

            /* Input fields */
            --input-bg-color: #ffffff;
            --input-text-color: #293e56;
            --input-border-color: #c5d2df;
            --input-focus-border-color: #1a73e8;
            --input-focus-shadow: 0 0 0 0.25rem rgba(26, 115, 232, 0.25);
            --input-disabled-bg-color: #f0f4f8;

            /* Buttons */
            --button-primary-bg: #1a73e8;
            --button-primary-text: #ffffff;
            --button-primary-hover-bg: #1765cc;
            --button-primary-border: #1a73e8;
            --button-secondary-bg: #6c89a5;
            --button-secondary-text: #ffffff;
            --button-secondary-hover-bg: #5a758d;
            --button-secondary-border: #6c89a5;
            --button-success-bg: #0f9d58;
            --button-success-text: #ffffff;
            --button-success-hover-bg: #0c8043;
            --button-success-border: #0f9d58;
            --button-outline-color: #1a73e8;
            --button-shadow: 0 2px 5px rgba(26, 115, 232, 0.2);

            /* Shadows */
            --box-shadow-sm: 0 .125rem .25rem rgba(41, 62, 86, .1);
            --box-shadow: 0 .5rem 1rem rgba(41, 62, 86, .15);
            --box-shadow-lg: 0 1rem 3rem rgba(41, 62, 86, .2);
        }

        /* ========== Base Styles Using Variables ========== */
        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: var(--font-family-base);
            transition: background-color var(--transition-speed), color var(--transition-speed);
        }

        h1,
        h2,
        h3,
        h4,
        h5,
        h6,
        .header-title {
            font-family: var(--font-family-headings);
            color: var(--text-color);
        }

        /* Site header */
        .site-header {
            background-color: var(--content-bg-color);
            padding: 1.25rem 0;
            border-bottom: 1px solid var(--border-color);
            margin-bottom: 2rem;
            box-shadow: var(--box-shadow-sm);
            transition: background-color var(--transition-speed), border-color var(--transition-speed);
        }

        .header-content {
            display: flex;
            align-items: center;
        }

        .header-title {
            margin: 0;
            font-size: 1.75rem;
            font-weight: var(--font-weight-bold);
            color: var(--primary-color);
            transition: color var(--transition-speed);
        }

        /* Main container */
        .main-container {
            max-width: 1000px;
            margin: 2rem auto;
            padding: 0 1rem;
        }

        /* Schema header */
        .schema-header {
            display: grid;
            grid-template-columns: 40px 1fr 1fr 40px;
            gap: 1rem;
            padding: 0.75rem 0.5rem;
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: var(--text-color);
            background-color: var(--content-bg-color);
            border: 1px solid var(--border-color);
            border-radius: var(--border-radius-sm);
            box-shadow: var(--box-shadow-sm);
            transition: background-color var(--transition-speed), border-color var(--transition-speed), color var(--transition-speed);
        }

        /* Field list container */
        #field-list {
            min-height: 50px;
            margin-bottom: 1rem;
        }

        /* Field rows */
        .field-row {
            display: grid;
            grid-template-columns: 40px 1fr 1fr 40px;
            gap: 1rem;
            padding: 0.75rem 0.5rem;
            margin-bottom: 0.5rem;
            background-color: var(--content-bg-color);
            border: 1px solid var(--border-color);
            border-radius: var(--border-radius-sm);
            align-items: center;
            box-shadow: var(--box-shadow-sm);
            transition: background-color var(--transition-speed), border-color var(--transition-speed);
        }

        .field-row:hover {
            background-color: var(--bg-color);
        }

        /* Drag handle */
        .drag-handle {
            cursor: move;
            color: var(--text-secondary-color);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.25rem;
            user-select: none;
            transition: color var(--transition-speed);
        }

        .drag-handle::before {
            content: "⋮⋮";
            letter-spacing: -2px;
        }

        /* Remove button */
        .remove-btn {
            color: #dc3545;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0.5;
            transition: color 0.2s, opacity 0.2s;
        }

        .field-row:hover .remove-btn {
            opacity: 1;
        }

        .remove-btn:hover {
            color: #bb2d3b;
        }

        /* Custom inputs */
        .custom-list-input,
        .blank-percentage-input {
            display: none;
            margin-top: 0.5rem;
        }

        /* Form controls */
        .form-control,
        .form-select {
            background-color: var(--input-bg-color);
            color: var(--input-text-color);
            border: 1px solid var(--input-border-color);
            transition: border-color var(--transition-speed), box-shadow var(--transition-speed), background-color var(--transition-speed), color var(--transition-speed);
        }

        .form-control:focus,
        .form-select:focus {
            background-color: var(--input-bg-color);
            color: var(--input-text-color);
            border-color: var(--input-focus-border-color);
            box-shadow: var(--input-focus-shadow);
        }

        .form-control:disabled,
        .form-select:disabled {
            background-color: var(--input-disabled-bg-color);
            color: var(--text-secondary-color);
        }

        /* Action buttons */
        .action-buttons {
            margin: 1.5rem 0;
        }

        /* Add field button */
        .btn-add-field {
            color: var(--primary-color);
            background: none;
            border: 1px solid var(--border-color);
            padding: 0.5rem 1rem;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            border-radius: var(--border-radius-sm);
            transition: color var(--transition-speed), background-color var(--transition-speed), border-color var(--transition-speed), box-shadow var(--transition-speed);
        }

        .btn-add-field:hover {
            color: var(--primary-color-hover);
            background-color: var(--bg-color);
            border-color: var(--primary-color);
            box-shadow: var(--box-shadow-sm);
        }

        /* Generation controls section */
        .generation-controls {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-top: 2rem;
            padding: 1rem;
            background-color: var(--content-bg-color);
            border: 1px solid var(--border-color);
            border-radius: var(--border-radius-sm);
            box-shadow: var(--box-shadow-sm);
            transition: background-color var(--transition-speed), border-color var(--transition-speed);
        }

        /* Control groups */
        .control-group {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .control-group label {
            margin: 0;
            white-space: nowrap;
            font-weight: 500;
            color: var(--text-color);
            transition: color var(--transition-speed);
        }

        .control-group input,
        .control-group select {
            width: 120px;
        }

        /* Generate button */
        .btn-generate {
            padding: 0.5rem 1.5rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: background-color var(--transition-speed), border-color var(--transition-speed), color var(--transition-speed), box-shadow var(--transition-speed);
        }

        .btn-primary {
            background-color: var(--button-primary-bg);
            color: var(--button-primary-text);
            border-color: var(--button-primary-border);
        }

        .btn-primary:hover {
            background-color: var(--button-primary-hover-bg);
            border-color: var(--button-primary-hover-bg);
            box-shadow: var(--button-shadow);
        }

        .btn-secondary {
            background-color: var(--button-secondary-bg);
            color: var(--button-secondary-text);
            border-color: var(--button-secondary-border);
        }

        .btn-secondary:hover {
            background-color: var(--button-secondary-hover-bg);
            border-color: var(--button-secondary-hover-bg);
            box-shadow: var(--button-shadow);
        }

        .btn-success {
            background-color: var(--button-success-bg);
            color: var(--button-success-text);
            border-color: var(--button-success-border);
        }

        .btn-success:hover {
            background-color: var(--button-success-hover-bg);
            border-color: var(--button-success-hover-bg);
            box-shadow: var(--button-shadow);
        }

        .btn-outline-success {
            color: var(--button-success-bg);
            border-color: var(--button-success-border);
        }

        .btn-outline-success:hover {
            background-color: var(--button-success-bg);
            color: var(--button-success-text);
            box-shadow: var(--button-shadow);
        }

        .btn-outline-secondary {
            color: var(--button-secondary-bg);
            border-color: var(--button-secondary-border);
        }

        .btn-outline-secondary:hover {
            background-color: var(--button-secondary-bg);
            color: var(--button-secondary-text);
            box-shadow: var(--button-shadow);
        }

        /* Preview Modal Styles */
        .modal-backdrop {
            background-color: rgba(0, 0, 0, 0.5);
        }

        .modal-content {
            background-color: var(--content-bg-color);
            color: var(--text-color);
            border-radius: var(--border-radius-lg);
            border: 1px solid var(--border-color);
            box-shadow: var(--box-shadow);
            transition: background-color var(--transition-speed), border-color var(--transition-speed), color var(--transition-speed);
        }

        .modal-header {
            border-bottom: 1px solid var(--border-color);
            padding: 1rem 1.5rem;
            background-color: var(--content-bg-color);
            color: var(--text-color);
            transition: background-color var(--transition-speed), border-color var(--transition-speed), color var(--transition-speed);
        }

        .modal-title {
            font-weight: 500;
            color: var(--text-color);
            transition: color var(--transition-speed);
        }

        .modal-body {
            background-color: var(--content-bg-color);
            color: var(--text-color);
            transition: background-color var(--transition-speed), color var(--transition-speed);
        }

        .preview-table {
            margin: 0;
        }

        .preview-table th {
            font-weight: 500;
            background-color: var(--bg-color);
            color: var(--text-color);
            transition: background-color var(--transition-speed), color var(--transition-speed);
            border-color: var(--border-color);
        }

        .preview-table td {
            background-color: var(--content-bg-color);
            color: var(--text-color);
            border-color: var(--border-color);
            transition: background-color var(--transition-speed), color var(--transition-speed), border-color var(--transition-speed);
        }

        .preview-table th,
        .preview-table td {
            font-size: 0.875rem;
            padding: 0.5rem 0.75rem;
            white-space: nowrap;
        }

        .tab-btn {
            border: none;
            background: none;
            font-weight: 500;
            font-size: 1rem;
            margin-right: 2rem;
            color: var(--text-secondary-color);
            padding: 0.5rem 0;
            border-bottom: 2px solid transparent;
            transition: color var(--transition-speed), border-bottom-color var(--transition-speed);
        }

        .tab-btn.active {
            color: var(--primary-color);
            border-bottom-color: var(--primary-color);
        }

        .modal-footer {
            border-top: 1px solid var(--border-color);
            padding: 1rem 1.5rem;
            background-color: var(--content-bg-color);
            transition: background-color var(--transition-speed), border-color var(--transition-speed);
        }

        .modal-footer .form-control {
            width: 100px;
        }

        /* Sortable ghost effect */
        .sortable-ghost {
            opacity: 0.5;
            background-color: var(--bg-color) !important;
        }

        /* Theme switcher */
        .theme-switcher {
            position: fixed;
            top: 10px;
            right: 10px;
            z-index: 1000;
            display: flex;
            padding: 0.25rem;
            background-color: transparent;
            border: none;
            box-shadow: none;
        }

        .theme-toggle {
            background: transparent;
            border: none;
            width: 2.5rem;
            height: 2.5rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            padding: 0;
            color: var(--text-color);
            font-size: 1.5rem;
            transition: transform 0.3s, color 0.3s;
        }

        .theme-toggle:hover {
            transform: scale(1.1);
            color: var(--primary-color);
        }

        .theme-toggle:focus {
            outline: none;
        }

        .theme-icon-light, .theme-icon-dark {
            position: absolute;
            transition: opacity 0.3s, transform 0.3s;
        }

        body:not(.theme-dark) .theme-icon-light {
            opacity: 1;
            transform: rotate(0);
        }

        body:not(.theme-dark) .theme-icon-dark {
            opacity: 0;
            transform: rotate(90deg);
        }

        body.theme-dark .theme-icon-light {
            opacity: 0;
            transform: rotate(-90deg);
        }

        body.theme-dark .theme-icon-dark {
            opacity: 1;
            transform: rotate(0);
        }

        /* Text color utility classes that use CSS variables */
        .text-muted {
            color: var(--text-secondary-color) !important;
        }

        #previewRawContent {
            background-color: var(--bg-color) !important;
            color: var(--text-color) !important;
            border-radius: var(--border-radius-sm);
            padding: 1rem;
            transition: background-color var(--transition-speed), color var(--transition-speed);
        }
    </style>
</head>

<body>
    <!-- Theme Switcher Toggle -->
    <div class="theme-switcher">
        <button class="theme-toggle" title="Toggle Theme">
            <i class="bi bi-sun-fill theme-icon-light"></i>
            <i class="bi bi-moon-fill theme-icon-dark"></i>
        </button>
    </div>

    <header class="site-header">
        <div class="container">
            <div class="header-content">
                <h1 class="header-title">Mock Data Factory</h1>
            </div>
        </div>
    </header>

    <div class="container">
        <div class="main-container">
            <div class="schema-header">
                <div></div>
                <div>Field Name</div>
                <div>Type</div>
                <div></div>
            </div>

            <div id="field-list">
                <!-- Field rows will be added here -->
                {% if default_schema %}
                {% for field in default_schema %}
                <div class="field-row" data-field-id="field-init-{{ loop.index }}">
                    <div class="drag-handle"></div>
                    <div>
                        <input type="text" class="form-control form-control-sm field-name"
                            id="field-init-{{ loop.index }}-name" name="field-init-{{ loop.index }}-name"
                            placeholder="Field Name" required value="{{ field.name }}">
                    </div>
                    <div>
                        <select class="form-select form-select-sm data-type" id="field-init-{{ loop.index }}-type"
                            name="field-init-{{ loop.index }}-type">
                            {% for type in ["Row Number", "First Name", "Last Name", "Full Name", "Email Address",
                            "Gender", "IP Address v4", "Phone Number", "City", "Country", "Date", "Number", "Decimal",
                            "Custom List", "Blank/Null"] %}
                            <option value="{{ type }}" {% if type==field.type %}selected{% endif %}>{{ type }}</option>
                            {% endfor %}
                        </select>
                        <input type="text" class="form-control form-control-sm custom-list-input"
                            id="field-init-{{ loop.index }}-custom-list" name="field-init-{{ loop.index }}-custom-list"
                            placeholder="Comma-separated values" style="display: none;">
                        <input type="number" class="form-control form-control-sm blank-percentage-input"
                            id="field-init-{{ loop.index }}-blank-percentage"
                            name="field-init-{{ loop.index }}-blank-percentage" placeholder="Blank %" min="0" max="100"
                            style="display: none;">
                    </div>
                    <div class="remove-btn" data-field-id="field-init-{{ loop.index }}">
                        <i class="bi bi-x-lg"></i>
                    </div>
                </div>
                {% endfor %}
                {% endif %}
            </div>

            <button type="button" class="btn-add-field" id="addFieldBtn">
                <i class="bi bi-plus-lg"></i>
                ADD ANOTHER FIELD
            </button>

            <div class="generation-controls">
                <div class="control-group">
                    <label for="numRows">Rows:</label>
                    <input type="number" class="form-control form-control-sm" id="numRows" value="100" min="1">
                </div>
                <div class="control-group">
                    <label for="outputFormat">Format:</label>
                    <select class="form-select form-select-sm" id="outputFormat">
                        <option value="CSV">CSV</option>
                        <option value="JSON">JSON</option>
                        <option value="XML">XML</option>
                        <option value="SQL">SQL</option>
                        <option value="Excel">Excel</option>
                    </select>
                </div>
                <div class="control-group ms-auto">
                    <button type="button" class="btn btn-success btn-generate" id="generateBtn">GENERATE DATA</button>
                    <button type="button" class="btn btn-outline-success btn-generate" id="previewBtn">PREVIEW</button>
                </div>
            </div>
        </div>

        <!-- Preview Modal -->
        <div class="modal fade" id="previewModal" tabindex="-1" aria-labelledby="previewModalLabel" aria-hidden="true">
            <div class="modal-dialog modal-xl modal-dialog-scrollable">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title" id="previewModalLabel">Preview</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body">
                        <div id="preview-content" class="preview-content"
                            style="display: block; max-height: 500px; overflow: auto; background-color: var(--bg-color); padding: 1rem; border-radius: var(--border-radius-sm);">
                        </div>
                        <div id="previewNote" class="text-muted small mt-2"></div>
                    </div>
                    <div class="modal-footer justify-content-between">
                        <div class="control-group">
                            <label for="previewNumRows">Rows:</label>
                            <input type="number" class="form-control form-control-sm" id="previewNumRows" value="20"
                                min="1" max="100">
                        </div>
                        <div>
                            <button type="button" class="btn btn-success btn-generate me-2"
                                id="generateFromPreviewBtn">GENERATE DATA</button>
                            <button type="button" class="btn btn-outline-secondary"
                                data-bs-dismiss="modal">CLOSE</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <script>
        // 常量和初始化
        const DATA_TYPES = [
            "Row Number",
            "First Name",
            "Last Name",
            "Full Name",
            "Email Address",
            "Gender",
            "IP Address v4",
            "Phone Number",
            "City",
            "Country",
            "Date",
            "Number",
            "Decimal",
            "Custom List",
            "Blank/Null"
        ];

        let fieldCounter = 0;

        // DOM元素选择
        const fieldList = document.getElementById('field-list');
        const addFieldBtn = document.getElementById('addFieldBtn');
        const generateBtn = document.getElementById('generateBtn');
        const previewBtn = document.getElementById('previewBtn');
        const previewNumRows = document.getElementById('previewNumRows');
        const generateFromPreviewBtn = document.getElementById('generateFromPreviewBtn');

        // 初始化Sortable
        new Sortable(fieldList, {
            animation: 150,
            handle: '.drag-handle',
            ghostClass: 'sortable-ghost'
        });

        // 字段管理函数
        function addField() {
            console.log('Adding new field'); // Debug log

            const fieldId = `field-${Date.now()}-${fieldCounter++}`;
            const fieldRow = document.createElement('div');
            fieldRow.className = 'field-row';
            fieldRow.dataset.fieldId = fieldId;

            fieldRow.innerHTML = `
                <div class="drag-handle"></div>
                <div>
                    <input type="text" class="form-control form-control-sm field-name" 
                           id="${fieldId}-name" 
                           name="${fieldId}-name" 
                           placeholder="Field Name" required>
                </div>
                <div>
                    <select class="form-select form-select-sm data-type" 
                            id="${fieldId}-type" 
                            name="${fieldId}-type">
                        ${DATA_TYPES.map(type =>
                `<option value="${type}" ${type === "Row Number" ? "selected" : ""}>${type}</option>`
            ).join('')}
                    </select>
                    <input type="text" class="form-control form-control-sm custom-list-input" 
                           id="${fieldId}-custom-list" 
                           name="${fieldId}-custom-list" 
                           placeholder="Comma-separated values">
                    <input type="number" class="form-control form-control-sm blank-percentage-input" 
                           id="${fieldId}-blank-percentage" 
                           name="${fieldId}-blank-percentage" 
                           placeholder="Blank %" min="0" max="100">
                </div>
                <div class="remove-btn" data-field-id="${fieldId}">
                    <i class="bi bi-x-lg"></i>
                </div>
            `;

            fieldList.appendChild(fieldRow);

            // 设置删除按钮的监听器
            const removeBtn = fieldRow.querySelector('.remove-btn');
            removeBtn.addEventListener('click', function () {
                removeField(this);
            });

            // 初始化附加输入框的可见性
            const typeSelect = document.getElementById(`${fieldId}-type`);
            handleDataTypeChange(typeSelect);

            // Auto-fill the field name based on the default type (Row Number)
            const nameInput = fieldRow.querySelector('.field-name');
            if (nameInput) {
                nameInput.value = generateSuggestedFieldName("Row Number");
                console.log('Auto-filled field name for new row:', nameInput.value);
            }
        }

        function removeField(button) {
            button.closest('.field-row').remove();
        }

        function handleDataTypeChange(select) {
            const fieldRow = select.closest('.field-row');
            const customListInput = fieldRow.querySelector('.custom-list-input');
            const blankPercentageInput = fieldRow.querySelector('.blank-percentage-input');

            // 隐藏所有特定输入
            customListInput.style.display = 'none';
            blankPercentageInput.style.display = 'none';

            // 根据选择的类型显示相应输入
            if (select.value === 'Custom List') {
                customListInput.style.display = 'block';
            } else if (select.value === 'Blank/Null') {
                blankPercentageInput.style.display = 'block';
            }
        }

        // 将类型名称转换为字段名建议
        function generateSuggestedFieldName(typeName) {
            // 特殊情况处理
            if (typeName === 'Row Number') {
                return 'id';
            }

            // 常规转换：转为小写，空格替换为下划线，移除非字母数字下划线字符
            return typeName.toLowerCase().replace(/\s+/g, '_').replace(/[^a-z0-9_]/g, '');
        }

        // Validate that each data type is used only once
        function validateUniqueTypes() {
            // Get all field rows
            const fieldRows = Array.from(document.querySelectorAll('.field-row'));

            // Extract type values from each field row
            const typeValues = fieldRows.map(row => {
                const typeSelect = row.querySelector('.data-type');
                return typeSelect.value;
            });

            // Check for duplicates by comparing array length with Set size
            const uniqueTypes = new Set(typeValues);

            if (uniqueTypes.size !== typeValues.length) {
                // Find the duplicate types
                const duplicateTypes = typeValues.filter((type, index) => {
                    return typeValues.indexOf(type) !== index;
                });

                // Create a message with the list of duplicated types
                const uniqueDuplicates = [...new Set(duplicateTypes)];
                const duplicateMessage = uniqueDuplicates.join(', ');

                // Alert the user
                alert(`Error: Duplicate types are not allowed. Please ensure each type is used only once.\n\nDuplicated types: ${duplicateMessage}`);

                return false;
            }

            return true;
        }

        // 数据收集和处理函数
        function collectSchema(numRowsOverride) {
            try {
                const schema = {
                    fields: [],
                    num_rows: numRowsOverride !== undefined ? parseInt(numRowsOverride) : parseInt(document.getElementById('numRows').value),
                    format: document.getElementById('outputFormat').value
                };

                // 获取所有字段行
                const fieldRows = Array.from(document.querySelectorAll('.field-row'));

                // 验证至少有一个字段
                if (fieldRows.length === 0) {
                    throw new Error("Please add at least one field");
                }

                // 处理每个字段行
                fieldRows.forEach((row, index) => {
                    const nameInput = row.querySelector('input[type="text"]');
                    const typeSelect = row.querySelector('.data-type');

                    // 验证字段名
                    const fieldName = nameInput.value.trim();
                    if (!fieldName) {
                        throw new Error(`Field #${index + 1} requires a name`);
                    }

                    // 创建字段对象
                    const field = {
                        name: fieldName,
                        type: typeSelect.value
                    };

                    // 添加类型特定配置
                    if (field.type === 'Custom List') {
                        const customListInput = row.querySelector('.custom-list-input');
                        const values = customListInput.value
                            .split(',')
                            .map(v => v.trim())
                            .filter(v => v);

                        if (values.length === 0) {
                            throw new Error(`Custom List field "${fieldName}" requires at least one value`);
                        }

                        field.values = values;
                    } else if (field.type === 'Blank/Null') {
                        const blankPercentageInput = row.querySelector('.blank-percentage-input');
                        const percentage = parseInt(blankPercentageInput.value) || 0;
                        if (percentage < 0 || percentage > 100) {
                            throw new Error(`Blank percentage for field "${fieldName}" must be between 0 and 100`);
                        }
                        field.blank_percentage = percentage;
                    }

                    schema.fields.push(field);
                });

                return schema;
            } catch (error) {
                alert(error.message);
                throw error;
            }
        }

        // Utility function to escape HTML for text formats
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function previewData() {
            console.log('Preview data called'); // Debug log

            try {
                // Check for duplicate types before proceeding
                if (!validateUniqueTypes()) {
                    return; // Stop execution if validation fails
                }

                const numRows = document.getElementById('previewNumRows').value || 20;
                const outputFormat = document.getElementById('outputFormat').value;
                const schema = collectSchema(numRows);

                // Add format to the schema
                schema.format = outputFormat;

                // Log the request details for debugging
                console.log('Sending preview request to:', '/preview');
                console.log('Preview request payload:', JSON.stringify(schema));

                fetch('/preview', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(schema)
                })
                    .then(response => {
                        console.log('Preview response status:', response.status);
                        if (!response.ok) {
                            return response.text().then(text => {
                                try {
                                    // Try to parse as JSON first
                                    const error = JSON.parse(text);
                                    throw new Error(error.error || `Server error: ${response.status}`);
                                } catch (e) {
                                    // If not JSON, return the text as error message
                                    throw new Error(text || `Server error: ${response.status}`);
                                }
                            });
                        }

                        // Check the format to determine how to handle the response
                        const format = outputFormat.toUpperCase();

                        if (format === 'CSV' || format === 'EXCEL') {
                            // For CSV and Excel, expect JSON data to render as a table
                            return response.json().then(responseData => {
                                // Handle new response format with data and field_order
                                console.log('Preview response data:', responseData); // 添加调试信息
                                if (responseData.data && responseData.field_order) {
                                    console.log('Using new format with separate data and field_order');
                                    return { format, data: responseData.data, fieldOrder: responseData.field_order };
                                } else {
                                    // Fallback for backward compatibility
                                    console.log('Using old format, response is direct data array');
                                    return { format, data: responseData };
                                }
                            });
                        } else {
                            // For JSON, XML, SQL - display formatted text in pre>code block
                            return response.text().then(text => {
                                return { format, text };
                            });
                        }
                    })
                    .then(result => {
                        showPreviewModal(result, numRows);
                    })
                    .catch(error => {
                        console.error('Error previewing data:', error);
                        alert('Preview error: ' + error.message);
                        // Show additional help if it's a connection error
                        if (error.message.includes('Failed to fetch')) {
                            alert('Server connection error. Please ensure the Flask server is running at http://localhost:5000');
                        }
                    });
            } catch (error) {
                console.error('Error preparing preview data:', error);
                // Error already handled in collectSchema
            }
        }

        function showPreviewModal(result, numRows) {
            const { format, data, text, fieldOrder } = result;
            console.log('Showing preview modal for format:', format); // Debug log

            const previewContent = document.getElementById('preview-content');

            // Clear previous content
            previewContent.innerHTML = '';

            if (format === 'CSV' || format === 'EXCEL') {
                // For CSV/Excel, create an HTML table
                // 检查数据格式，适应两种数据结构
                const dataArray = Array.isArray(data) ? data : [];
                if (dataArray.length > 0) {
                    // Create table element
                    const table = document.createElement('table');
                    table.className = 'table table-striped table-bordered preview-table';

                    // Create header row
                    const thead = document.createElement('thead');
                    const headerRow = document.createElement('tr');
                    
                    // Use fieldOrder if available, otherwise fallback to Object.keys
                    const headers = fieldOrder || Object.keys(dataArray[0]);
                    headers.forEach(header => {
                        const th = document.createElement('th');
                        th.textContent = header;
                        headerRow.appendChild(th);
                    });

                    thead.appendChild(headerRow);
                    table.appendChild(thead);

                    // Create body rows
                    const tbody = document.createElement('tbody');

                    dataArray.forEach(row => {
                        const tr = document.createElement('tr');

                        headers.forEach(header => {
                            const td = document.createElement('td');
                            // Check if the field exists in the row
                            if (header in row) {
                                td.textContent = row[header] !== null ? row[header] : '';
                            } else {
                                td.textContent = '';
                                console.warn(`Field ${header} not found in row data`);
                            }
                            tr.appendChild(td);
                        });

                        tbody.appendChild(tr);
                    });

                    table.appendChild(tbody);
                    previewContent.appendChild(table);
                } else {
                    previewContent.textContent = 'No data available for preview.';
                }
            } else {
                // For JSON, XML, SQL - display formatted text in pre>code block
                const pre = document.createElement('pre');
                const code = document.createElement('code');
                code.innerHTML = escapeHtml(text);
                pre.appendChild(code);
                previewContent.appendChild(pre);
            }

            // Set a note about the preview
            document.getElementById('previewNote').textContent =
                format === 'EXCEL'
                    ? 'Excel preview shown as a table. Use "Generate Data" to download the actual Excel file.'
                    : `Showing preview in ${format} format (limited to ${numRows} rows)`;

            document.getElementById('previewNumRows').value = numRows;

            // 使用现有的模态框元素，不再克隆
            const previewModalElement = document.getElementById('previewModal');
            
            // 添加模态框隐藏时的清理处理
            previewModalElement.addEventListener('hidden.bs.modal', function () {
                // 移除所有可能残留的backdrop
                const backdrops = document.querySelectorAll('.modal-backdrop');
                backdrops.forEach(backdrop => backdrop.remove());
                
                // 重置body样式
                document.body.classList.remove('modal-open');
                document.body.style.overflow = '';
                document.body.style.paddingRight = '';
                
                console.log('Modal cleanup complete');
            });

            // Show the modal
            const previewModal = new bootstrap.Modal(previewModalElement);
            previewModal.show();
        }

        function generateData(fromPreview = false) {
            console.log('Generate data called', fromPreview ? 'from preview' : 'from main button'); // Debug log

            try {
                const numRows = fromPreview ? document.getElementById('previewNumRows').value : undefined;

                // Check for duplicate types before proceeding
                if (!validateUniqueTypes()) {
                    return; // Stop execution if validation fails
                }

                const schema = collectSchema(numRows);

                fetch('/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(schema)
                })
                    .then(response => {
                        if (!response.ok) {
                            return response.json().then(err => { throw new Error(err.error || 'Server error'); });
                        }
                        // 不管是否来自预览模式，都是获取blob用于下载
                        return response.blob();
                    })
                    .then(data => {
                        // 为所有情况处理文件下载
                        console.log('Generating download for format:', schema.format);
                        const url = window.URL.createObjectURL(data);
                        const a = document.createElement('a');
                        a.href = url;
                        a.download = `mock_data_${new Date().toISOString().replace(/[:.]/g, '-')}.${schema.format.toLowerCase()}`;
                        document.body.appendChild(a);
                        a.click();
                        window.URL.revokeObjectURL(url);
                        a.remove();
                        
                        // 如果是从预览模式调用，关闭模态框
                        if (fromPreview) {
                            try {
                                const previewModalElement = document.getElementById('previewModal');
                                const modalInstance = bootstrap.Modal.getInstance(previewModalElement);
                                if (modalInstance) {
                                    modalInstance.hide();
                                }
                            } catch (err) {
                                console.error('Error closing modal:', err);
                            }
                        }
                    })
                    .catch(error => {
                        console.error('Error generating data:', error);
                        alert('Error: ' + error.message);
                    });
            } catch (error) {
                console.error('Error preparing data:', error);
                // Error already handled in collectSchema
            }
        }

        // 事件监听器
        document.addEventListener('DOMContentLoaded', function () {
            // 为numRows输入框添加验证逻辑，确保不能输入小于等于0的值
            const numRowsInput = document.getElementById('numRows');
            numRowsInput.addEventListener('input', function() {
                const value = parseInt(this.value);
                if (value <= 0) {
                    this.value = 1;
                }
            });
            
            // 针对预览行数也添加同样的验证
            const previewNumRowsInput = document.getElementById('previewNumRows');
            previewNumRowsInput.addEventListener('input', function() {
                const value = parseInt(this.value);
                if (value <= 0) {
                    this.value = 1;
                }
            });
            console.log('DOM fully loaded'); // Debug log

            // Only add an initial field if the field list is empty
            if (fieldList.children.length === 0) {
                // 添加初始字段
                addField();
            } else {
                // Initialize event handlers for default fields
                document.querySelectorAll('.field-row .remove-btn').forEach(btn => {
                    btn.addEventListener('click', function () {
                        removeField(this);
                    });
                });

                // Initialize input handlers for default fields
                document.querySelectorAll('.field-row .data-type').forEach(select => {
                    handleDataTypeChange(select);
                });
            }

            // 添加事件监听器
            addFieldBtn.addEventListener('click', function () {
                console.log('Add field button clicked'); // Debug log
                addField();
            });

            generateBtn.addEventListener('click', function () {
                console.log('Generate button clicked'); // Debug log
                generateData(false);
            });

            previewBtn.addEventListener('click', function () {
                console.log('Preview button clicked'); // Debug log
                previewData();
            });

            generateFromPreviewBtn.addEventListener('click', function () {
                console.log('Generate from preview button clicked'); // Debug log
                generateData(true);
            });

            previewNumRows.addEventListener('change', function () {
                console.log('Preview num rows changed, but not refreshing preview'); // Debug log
                // Removed previewData() call to prevent auto-refresh
            });

            // 使用事件委托监听字段类型变化
            fieldList.addEventListener('change', function (event) {
                // 检查触发事件的是否是类型下拉框
                if (event.target.classList.contains('data-type')) {
                    console.log('Type dropdown changed'); // Debug log

                    // 获取字段行和相关元素
                    const typeSelect = event.target;
                    const fieldRow = typeSelect.closest('.field-row');

                    if (fieldRow) {
                        // 处理特定类型的附加输入显示/隐藏
                        handleDataTypeChange(typeSelect);

                        // 找到该行中的字段名输入框
                        const nameInput = fieldRow.querySelector('input[type="text"]');

                        // Always auto-fill the field name based on the selected type
                        if (nameInput) {
                            const selectedType = typeSelect.value;
                            const suggestedName = generateSuggestedFieldName(selectedType);
                            nameInput.value = suggestedName;
                            console.log('Auto-filled field name:', suggestedName); // Debug log
                        } else {
                            console.log('Field name input not found'); // Debug log
                        }
                    }
                }
            });

            // Theme toggle functionality
            const themeToggle = document.querySelector('.theme-toggle');
            
            // Handle theme toggle clicks
            themeToggle.addEventListener('click', function() {
                // Check if dark theme is currently active
                const isDarkTheme = document.body.classList.contains('theme-dark');
                
                // Toggle between light and dark themes
                const newTheme = isDarkTheme ? 'light' : 'dark';
                applyTheme(newTheme);
                
                // Save theme preference
                localStorage.setItem('selectedTheme', newTheme);
            });
            
            // Check for saved theme
            const savedTheme = localStorage.getItem('selectedTheme');
            if (savedTheme) {
                applyTheme(savedTheme);
            }

            // Function to apply a theme
            function applyTheme(theme) {
                // Remove any existing theme classes
                document.body.classList.remove('theme-dark', 'theme-blue');

                // Add the selected theme class if not light (default)
                if (theme !== 'light') {
                    document.body.classList.add(`theme-${theme}`);
                }

                console.log(`Theme switched to: ${theme}`);
            }
        });
    </script>
</body>

</html>
