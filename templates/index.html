<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mock Data Factory</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link
        href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&family=Poppins:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <link href="{{ url_for('static', filename='css/main.css') }}" rel="stylesheet">
</head>

<body>
    <div class="theme-switcher">
        <button class="theme-toggle" title="Toggle Theme">
            <i class="bi bi-sun-fill theme-icon-light"></i>
            <i class="bi bi-moon-fill theme-icon-dark"></i>
        </button>
    </div>

    <header class="site-header">
        <div class="container">
            <div class="header-content">
                <h1 class="header-title">Mock Data Factory</h1>
            </div>
        </div>
    </header>

    <div class="container">
        <div class="main-container">
            <div class="schema-header">
                <div></div>
                <div>Field Name</div>
                <div>Type</div>
                <div></div>
            </div>

            <div id="field-list">
                {% if default_schema %}
                {% for field in default_schema %}
                <div class="field-row" data-field-id="field-init-{{ loop.index }}">
                    <div class="drag-handle"></div>
                    <div>
                        <input type="text" class="form-control form-control-sm field-name"
                            id="field-init-{{ loop.index }}-name"
                            name="field-init-{{ loop.index }}-name"
                            placeholder="Field Name" required value="{{ field.name }}">
                    </div>
                    <div>
                        <select class="form-select form-select-sm data-type"
                            id="field-init-{{ loop.index }}-type"
                            name="field-init-{{ loop.index }}-type">
                            {% for type in ["Row Number", "First Name", "Last Name", "Full Name", "Email Address",
                            "Gender", "IP Address v4", "Phone Number", "City", "Country", "Date", "Number", "Decimal",
                            "Custom List", "Blank/Null"] %}
                            <option value="{{ type }}" {% if type==field.type %}selected{% endif %}>{{ type }}</option>
                            {% endfor %}
                        </select>
                        <input type="text" class="form-control form-control-sm custom-list-input"
                            id="field-init-{{ loop.index }}-custom-list"
                            name="field-init-{{ loop.index }}-custom-list"
                            placeholder="Comma-separated values">
                        <input type="number" class="form-control form-control-sm blank-percentage-input"
                            id="field-init-{{ loop.index }}-blank-percentage"
                            name="field-init-{{ loop.index }}-blank-percentage"
                            placeholder="Blank %" min="0" max="100">
                        <div class="blank-modifier">
                            <label for="field-init-{{ loop.index }}-null-pct">Null %:</label>
                            <input type="number" class="form-control form-control-sm null-modifier"
                                id="field-init-{{ loop.index }}-null-pct"
                                min="0" max="100" value="0"
                                title="Percentage of values to leave null for this field">
                        </div>
                    </div>
                    <div class="remove-btn" data-field-id="field-init-{{ loop.index }}" title="Remove field">
                        <i class="bi bi-x-lg"></i>
                    </div>
                </div>
                {% endfor %}
                {% endif %}
            </div>

            <button type="button" class="btn-add-field" id="addFieldBtn">
                <i class="bi bi-plus-lg"></i>
                ADD ANOTHER FIELD
            </button>

            <div class="generation-controls">
                <div class="control-group">
                    <label for="numRows">Rows:</label>
                    <input type="number" class="form-control form-control-sm" id="numRows" value="100" min="1">
                </div>
                <div class="control-group">
                    <label for="outputFormat">Format:</label>
                    <select class="form-select form-select-sm" id="outputFormat">
                        <option value="CSV">CSV</option>
                        <option value="JSON">JSON</option>
                        <option value="XML">XML</option>
                        <option value="SQL">SQL</option>
                        <option value="Excel">Excel</option>
                    </select>
                </div>
                <div class="control-group ms-auto">
                    <button type="button" class="btn btn-success btn-generate" id="generateBtn">GENERATE DATA</button>
                    <button type="button" class="btn btn-outline-success btn-generate" id="previewBtn">PREVIEW</button>
                </div>
            </div>
        </div>

        <div class="modal fade" id="previewModal" tabindex="-1" aria-labelledby="previewModalLabel" aria-hidden="true">
            <div class="modal-dialog modal-xl modal-dialog-scrollable">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title" id="previewModalLabel">Preview</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body">
                        <div id="preview-content" class="preview-content"></div>
                        <div id="previewNote" class="text-muted small mt-2"></div>
                    </div>
                    <div class="modal-footer justify-content-between">
                        <div class="control-group">
                            <label for="previewNumRows">Rows:</label>
                            <input type="number" class="form-control form-control-sm" id="previewNumRows"
                                value="20" min="1" max="100">
                        </div>
                        <div>
                            <button type="button" class="btn btn-success btn-generate me-2"
                                id="generateFromPreviewBtn">GENERATE DATA</button>
                            <button type="button" class="btn btn-outline-secondary"
                                data-bs-dismiss="modal">CLOSE</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="toast-container" id="toast-container" aria-live="polite" aria-atomic="true"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>

</html>
