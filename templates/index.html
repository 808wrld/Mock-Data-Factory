<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mock Data Factory</title>
    <meta name="description" content="Schema-driven mock data generator. CSV · JSON · XML · SQL · Excel.">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;500&family=Geist:wght@300;400;500;600&family=Instrument+Serif:ital@0;1&display=swap"
        rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/main.css') }}" rel="stylesheet">
</head>

<body>
    <div class="theme-switcher">
        <button class="theme-toggle" title="Toggle theme" aria-label="Toggle theme">
            <i class="bi bi-sun-fill theme-icon-light" aria-hidden="true"></i>
            <i class="bi bi-moon-fill theme-icon-dark" aria-hidden="true"></i>
        </button>
    </div>

    <header class="site-header">
        <div class="container">
            <div class="header-content">
                <h1 class="header-title">Mock&nbsp;Data <em>Factory</em></h1>
            </div>
        </div>
    </header>

    <main class="container">
        <div class="main-container">
            <div class="section-label">
                <span>Schema</span>
            </div>

            <div class="schema-header" role="row">
                <div></div>
                <div>Field Name</div>
                <div>Type</div>
                <div></div>
            </div>

            <div id="field-list">
                {% if default_schema %}
                {% for field in default_schema %}
                <div class="field-row" data-field-id="field-init-{{ loop.index }}">
                    <div class="drag-handle" title="Drag to reorder"></div>
                    <div>
                        <input type="text" class="form-control form-control-sm field-name"
                            id="field-init-{{ loop.index }}-name"
                            name="field-init-{{ loop.index }}-name"
                            placeholder="field_name" required value="{{ field.name }}" autocomplete="off">
                    </div>
                    <div>
                        <select class="form-select form-select-sm data-type"
                            id="field-init-{{ loop.index }}-type"
                            name="field-init-{{ loop.index }}-type">
                            {% for type in ["Row Number", "First Name", "Last Name", "Full Name", "Email Address",
                            "Gender", "IP Address v4", "Phone Number", "City", "Country", "Date", "Number", "Decimal",
                            "Custom List", "Blank/Null"] %}
                            <option value="{{ type }}" {% if type==field.type %}selected{% endif %}>{{ type }}</option>
                            {% endfor %}
                        </select>
                        <input type="text" class="form-control form-control-sm custom-list-input"
                            id="field-init-{{ loop.index }}-custom-list"
                            name="field-init-{{ loop.index }}-custom-list"
                            placeholder="value1, value2, value3">
                        <input type="number" class="form-control form-control-sm blank-percentage-input"
                            id="field-init-{{ loop.index }}-blank-percentage"
                            name="field-init-{{ loop.index }}-blank-percentage"
                            placeholder="Blank %" min="0" max="100">
                        <div class="blank-modifier">
                            <label for="field-init-{{ loop.index }}-null-pct">null %</label>
                            <input type="number" class="form-control form-control-sm null-modifier"
                                id="field-init-{{ loop.index }}-null-pct"
                                min="0" max="100" value="0"
                                title="Percentage of values to leave null">
                        </div>
                    </div>
                    <div class="remove-btn" data-field-id="field-init-{{ loop.index }}" title="Remove field">
                        <i class="bi bi-x-lg"></i>
                    </div>
                </div>
                {% endfor %}
                {% endif %}
            </div>

            <button type="button" class="btn-add-field" id="addFieldBtn">
                <i class="bi bi-plus" aria-hidden="true"></i>
                Add field
            </button>

            <div class="section-label">
                <span>Output</span>
            </div>

            <div class="generation-controls">
                <div class="control-group">
                    <label for="numRows">Rows</label>
                    <input type="number" class="form-control form-control-sm" id="numRows" value="100" min="1">
                </div>
                <div class="control-group">
                    <label for="outputFormat">Format</label>
                    <select class="form-select form-select-sm" id="outputFormat">
                        <option value="CSV">CSV</option>
                        <option value="JSON">JSON</option>
                        <option value="XML">XML</option>
                        <option value="SQL">SQL</option>
                        <option value="Excel">Excel</option>
                    </select>
                </div>
                <div class="control-group ms-auto">
                    <button type="button" class="btn btn-outline-success btn-generate" id="previewBtn">Preview</button>
                    <button type="button" class="btn btn-success btn-generate" id="generateBtn">Generate</button>
                </div>
            </div>
        </div>

        <footer class="site-footer container">
            <span>Open source · MIT · </span>
            <a href="https://github.com/808wrld/Mock-Data-Factory" target="_blank" rel="noopener">github.com/808wrld/mock-data-factory</a>
        </footer>

        <div class="modal fade" id="previewModal" tabindex="-1" aria-labelledby="previewModalLabel" aria-hidden="true">
            <div class="modal-dialog modal-xl modal-dialog-scrollable">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title" id="previewModalLabel">Preview</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body">
                        <div id="preview-content" class="preview-content"></div>
                        <div id="previewNote" class="mt-3"></div>
                    </div>
                    <div class="modal-footer justify-content-between">
                        <div class="control-group inline">
                            <label for="previewNumRows">Rows</label>
                            <input type="number" class="form-control form-control-sm" id="previewNumRows"
                                value="20" min="1" max="100" style="width: 80px;">
                        </div>
                        <div>
                            <button type="button" class="btn btn-outline-secondary me-2"
                                data-bs-dismiss="modal">Close</button>
                            <button type="button" class="btn btn-success btn-generate"
                                id="generateFromPreviewBtn">Generate</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div class="toast-container" id="toast-container" aria-live="polite" aria-atomic="true"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>

</html>
